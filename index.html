<!DOCTYPE html>
<html>
<head>
  <title>Air Joseph Store</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin-top: 80px;
    }

    h1 {
      font-size: 40px;
      font-weight: bold;
    }

    p {
      font-size: 20px;
      margin-bottom: 40px;
    }

    .store-button {
      display: inline-block;
      margin: 20px;
      padding: 20px;
      width: 220px;
      border-radius: 20px; /* curved edges */
      background-color: white;
      text-decoration: none;
      color: black;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .store-button:hover {
      transform: scale(1.05);
    }

    .store-button img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

  <h1>Air Joseph Store</h1>
  <p>Choose the shop you want to go to:</p>

  <a href="/store1.html" class="store-button">
    <img src="https://via.placeholder.com/200x150" alt="Store 1">
    Shirts
  </a>

  <a href="/store2.html" class="store-button">
    <img src="https://via.placeholder.com/200x150" alt="Store 2">
    Shoes
  </a>

</body>
</html>
